name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'tps-core/tps/pkgs/**'
      - 'tps-core/tps/app/srv/**'
      - 'tps-core/tps/app/db/**'
      - 'tps-core/tps/app/web/deploy/**'
  workflow_dispatch:
    inputs:
      restart:
        description: 'Restart container after deploy'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: cd /opt/tps-app && git pull origin main

      - name: Clear cache
        run: curl -s http://localhost:3300/clear-cache/ || true

      - name: Restart container
        if: inputs.restart == 'true'
        run: |
          docker restart tps-app
          sleep 15
          docker ps --filter name=tps-app --format '{{.Status}}'

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3300/)
          echo "Homepage: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Homepage returned HTTP $STATUS"
          fi
